    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      -webkit-font-smoothing: antialiased;
      background: #f8fafc;
    }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes ecgLine {
      0%   { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulseRing {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .correct-pop    { animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards; }
    .ecg-path       { stroke-dasharray: 600; animation: ecgLine 2s ease forwards; }
    .pulse-ring     { animation: pulseRing 1.5s ease-out infinite; }
    .font-display   { font-family: 'Outfit', sans-serif; }

    <div className="w-full flex items-center justify-center">
      {map[type] || <EcgSvg color={color}/>}
    </div>
  );
};

// ============================================================
// Main App
// ============================================================

const App = () => {
  const [chIdx, setChIdx] = useState(0);
  const [frIdx, setFrIdx] = useState(0);
  const [input, setInput] = useState("");
  const [correct, setCorrect] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);
  const [done, setDone] = useState(() => new Set());
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [frameKey, setFrameKey] = useState(0);

  const inputRef = useRef(null);
  const bodyRef  = useRef(null);

  const chapter = CHAPTERS[chIdx];
  const frame   = chapter.frames[frIdx];
  const c       = COLORS[chapter.color];
  const totalCh = CHAPTERS.length;
  const totalFr = chapter.frames.length;
  const isFirst = chIdx === 0 && frIdx === 0;
  const isLast  = chIdx === totalCh - 1 && frIdx === totalFr - 1;
  const globalProgress = (done.size / TOTAL_FRAMES) * 100;

  const resetFrame = useCallback(() => {
    setInput("");
    setCorrect(false);
    setShowHint(false);
    setShowAnswer(false);
    setFrameKey(k => k + 1);
    if (bodyRef.current) bodyRef.current.scrollTop = 0;
    setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 50);
  }, []);

  const navigate = useCallback((direction) => {
    if (direction === "next") {
      if (frIdx < totalFr - 1) {
        setFrIdx(f => f + 1);
      } else if (chIdx < totalCh - 1) {
        setChIdx(c => c + 1);
        setFrIdx(0);
      }
    } else {
      if (frIdx > 0) {
        setFrIdx(f => f - 1);
      } else if (chIdx > 0) {
        const prevCh = chIdx - 1;
        setChIdx(prevCh);
        setFrIdx(CHAPTERS[prevCh].frames.length - 1);
      }
    }
    resetFrame();
    setSidebarOpen(false);
  }, [chIdx, frIdx, totalFr, totalCh, resetFrame]);

  const goToChapter = useCallback((idx) => {
    setChIdx(idx);
    setFrIdx(0);
    resetFrame();
    setSidebarOpen(false);
  }, [resetFrame]);

  const handleInput = (e) => {
    const val = e.target.value;
    setInput(val);
    if (val.trim().toLowerCase() === frame.blank.toLowerCase()) {
      setCorrect(true);
      setDone(prev => new Set(prev).add(frame.id));
    }
  };

  const revealAnswer = () => {
    setInput(frame.blank);
    setCorrect(true);
    setShowAnswer(true);
    setDone(prev => new Set(prev).add(frame.id));
  };

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.key === "Enter" && correct) navigate("next");
      if (e.key === "ArrowRight" && correct) navigate("next");
      if (e.key === "ArrowLeft") navigate("prev");
      if (e.key === "Escape") setSidebarOpen(false);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [correct, navigate]);

  // Auto-focus input
  useEffect(() => {
    setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 60);
  }, [frIdx, chIdx]);

  const chapterDoneCount = (chIdx) =>
    CHAPTERS[chIdx].frames.filter(f => done.has(f.id)).length;

  // Text renderer with blank input
  const renderText = () => {
    const parts = frame.text.split("__________");
    return (
      <span>
        {parts.map((part, i) => (
          <React.Fragment key={i}>
            {part}
            {i < parts.length - 1 && (
              <span className="inline-block align-baseline mx-1">
                <input
                  ref={inputRef}
                  type="text"
                  value={input}
                  onChange={handleInput}
                  disabled={correct}
                  placeholder="___"
                  spellCheck={false}
                  autoCapitalize="none"
                  autoComplete="off"
                  className={`border-b-2 bg-transparent outline-none text-center align-baseline transition-all duration-200
                    ${correct
                      ? (showAnswer
                        ? "border-blue-400 text-blue-700 font-bold"
                        : "border-green-500 text-green-700 font-bold correct-pop")
                      : `border-slate-300 focus:border-current ${c.text}`
                    }`}
                  style={{ width: `${Math.max(frame.blank.length * 1.05, 5)}ch` }}
                />
              </span>
            )}
          </React.Fragment>
        ))}
      </span>
    );
  };

  return (
    <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-800 font-sans">

      {/* Overlay for mobile sidebar */}
      {sidebarOpen && (
        <div className="fixed inset-0 bg-black/40 z-20 md:hidden" onClick={() => setSidebarOpen(false)}/>
      )}

      {/* Sidebar */}
      <aside
        className={`fixed md:relative z-30 inset-y-0 left-0 w-72 bg-white border-r border-slate-200 flex flex-col
          shadow-xl md:shadow-sm transition-transform duration-300
          ${sidebarOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`}
      >
        {/* Brand */}
        <div className="p-5 border-b border-slate-100 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg bg-red-600 flex items-center justify-center shrink-0">
              <Activity className="w-4 h-4 text-white"/>
            </div>
            <div>
              <h1 className="font-display font-bold text-base leading-none">EKG Master</h1>
              <p className="text-[10px] text-slate-400 mt-0.5">Dubin 6th Edition</p>
            </div>
          </div>
          <button className="md:hidden p-1 text-slate-400" onClick={() => setSidebarOpen(false)}>
            <X size={18}/>
          </button>
        </div>

        {/* Chapter list */}
        <nav className="flex-1 overflow-y-auto py-3 px-3 space-y-1">
          {CHAPTERS.map((ch, idx) => {
            const count = chapterDoneCount(idx);
            const thisc = COLORS[ch.color];
            const active = idx === chIdx;
            return (
              <button
                key={ch.id}
                id={`chapter-btn-${ch.id}`}
                onClick={() => goToChapter(idx)}
                className={`w-full text-left px-3 py-2.5 rounded-xl text-sm transition-all flex items-center gap-3
                  ${active
                    ? `${thisc.bg} ${thisc.text} font-semibold ring-1 ${thisc.ring}`
                    : "hover:bg-slate-50 text-slate-600"
                  }`}
              >
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 text-white ${thisc.num}`}>
                  {ch.id}
                </div>
                <span className="flex-1 truncate">{ch.title}</span>
                {count > 0 && (
                  <span className={`text-[10px] font-bold shrink-0 ${thisc.text}`}>
                    {count}/{ch.frames.length}
                  </span>
                )}
              </button>
            );
          })}
        </nav>

        {/* Global Progress */}
        <div className="p-4 border-t border-slate-100">
          <div className="flex justify-between text-xs text-slate-400 mb-1.5 font-semibold uppercase tracking-widest">
            <span>Progress</span>
            <span>{done.size}/{TOTAL_FRAMES}</span>
          </div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
            <div
              className="h-full bg-gradient-to-r from-green-500 to-emerald-400 transition-all duration-500 rounded-full"
              style={{ width: `${globalProgress}%` }}
            />
          </div>
          <p className="text-[10px] text-slate-400 mt-1 text-right">
            {Math.round(globalProgress)}% complete
          </p>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 flex flex-col h-full overflow-hidden">

        {/* Top bar */}
        <header className={`shrink-0 ${c.bg} border-b ${c.border} px-4 md:px-6 py-3 flex items-center justify-between gap-4`}>
          <div className="flex items-center gap-3">
            <button
              id="menu-btn"
              className="md:hidden p-2 rounded-lg hover:bg-white/50 transition"
              onClick={() => setSidebarOpen(true)}
            >
              <List size={20} className={c.text}/>
            </button>
            <div>
              <p className={`text-[10px] font-bold uppercase tracking-widest ${c.text} opacity-70`}>
                Chapter {chapter.id}
              </p>
              <h2 className={`font-display font-bold text-base md:text-lg leading-tight ${c.text}`}>
                {chapter.title}
              </h2>
            </div>
          </div>

          <div className="flex items-center gap-2">
            <button
              id="prev-btn"
              onClick={() => navigate("prev")}
              disabled={isFirst}
              className="p-2 rounded-lg hover:bg-white/50 disabled:opacity-30 transition"
            >
              <ChevronLeft size={20} className={c.text}/>
            </button>
            <span className={`text-xs font-bold ${c.text} min-w-[48px] text-center tabular-nums`}>
              {frIdx+1} / {totalFr}
            </span>
            <button
              id="next-btn"
              onClick={() => navigate("next")}
              disabled={isLast}
              className="p-2 rounded-lg hover:bg-white/50 disabled:opacity-30 transition"
            >
              <ChevronRight size={20} className={c.text}/>
            </button>
          </div>
        </header>

        {/* Content body */}
        <div ref={bodyRef} className="flex-1 overflow-y-auto px-4 md:px-8 py-6 scroll-smooth">
          <div className="max-w-2xl mx-auto space-y-5 pb-12">

            {/* Visual card */}
            <div key={`visual-${frameKey}`}
              className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 frame-enter">
              <Visual type={frame.visual} color={
                ({ red:"#ef4444", orange:"#f97316", amber:"#f59e0b", yellow:"#ca8a04",
                   lime:"#65a30d", green:"#16a34a", teal:"#0d9488", cyan:"#0891b2",
                   blue:"#2563eb", violet:"#7c3aed", purple:"#9333ea", rose:"#e11d48" })[chapter.color]
              }/>
            </div>

            {/* Frame card */}
            <div key={`frame-${frameKey}`}
              className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 relative frame-enter">

              {correct && (
                <div className="absolute top-4 right-4 correct-pop">
                  <CheckCircle2 className="w-7 h-7 text-green-500"/>
                </div>
              )}

              {/* Frame text */}
              <p className="text-base md:text-lg leading-relaxed text-slate-700 font-medium mb-6">
                {renderText()}
              </p>

              {/* Action row */}
              <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 pt-5 border-t border-slate-100">
                <div className="flex items-center gap-4">
                  <button
                    id="hint-btn"
                    onClick={() => { setShowHint(h => !h); setShowAnswer(false); }}
                    className={`text-xs font-bold uppercase tracking-widest transition-colors
                      ${showHint ? c.text : "text-slate-400 hover:text-slate-600"}`}
                  >
                    {showHint ? "Hide Hint" : "Hint"}
                  </button>
                  <button
                    id="reveal-btn"
                    onClick={revealAnswer}
                    disabled={correct && !showAnswer}
                    className="flex items-center gap-1 text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors disabled:opacity-30"
                  >
                    <Eye size={13}/>
                    Reveal
                  </button>
                </div>

                {correct && (
                  <button
                    id="continue-btn"
                    onClick={() => navigate("next")}
                    disabled={isLast}
                    className={`w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 rounded-xl text-white text-sm font-bold shadow-md transition-all active:scale-95 ${c.btn} disabled:opacity-40`}
                  >
                    {isLast ? (
                      <><Award size={16}/> Finished!</>
                    ) : (
                      <>Continue <ChevronRight size={16}/></>
                    )}
                  </button>
                )}
              </div>

              {/* Hint */}
              {showHint && (
                <div className={`mt-4 p-3 rounded-xl border text-sm font-medium frame-enter ${c.bg} ${c.text} ${c.border}`}>
                  <span className="font-bold">Hint: </span>{frame.hint}
                </div>
              )}

              {/* Revealed answer */}
              {showAnswer && (
                <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-700 font-medium frame-enter">
                  <span className="font-bold">Answer: </span>
                  <span className="underline decoration-2">{frame.blank}</span>
                </div>
              )}
            </div>

            {/* Chapter tip */}
            <div className={`rounded-xl border p-4 text-sm frame-enter ${c.bg} ${c.border}`}>
              <p className={`font-bold text-xs uppercase tracking-widest mb-1 ${c.text} opacity-70`}>
                Dubin's Tip
              </p>
              <p className={`${c.text} leading-relaxed`}>{chapter.tip}</p>
            </div>

            {/* Keyboard hint */}
            <p className="text-center text-[11px] text-slate-400 hidden md:block">
              Press <kbd className="px-1.5 py-0.5 bg-slate-200 rounded text-slate-500 font-mono text-[10px]">Enter</kbd> or
              <kbd className="px-1.5 py-0.5 bg-slate-200 rounded text-slate-500 font-mono text-[10px] ml-1">→</kbd> to continue after answering
            </p>

          </div>
        </div>
      </main>

    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
